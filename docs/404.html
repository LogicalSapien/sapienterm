<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SapienTerm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f0d;
      --surface:   #141714;
      --border:    #2a302a;
      --green:     #39ff8a;
      --green-dim: #1a7a42;
      --text:      #e2e8e2;
      --text-muted:#8fa08f;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .code {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      line-height: 1;
      color: var(--green);
      opacity: .15;
      letter-spacing: -.04em;
      user-select: none;
    }

    .terminal-line {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 1rem;
      color: var(--text-muted);
      margin: 1.5rem 0 .5rem;
    }
    .terminal-line .prompt { color: var(--green); }

    h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: .6rem;
    }

    p {
      color: var(--text-muted);
      max-width: 380px;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .95rem;
      font-weight: 600;
      padding: .7rem 1.4rem;
      transition: border-color .15s, transform .1s;
    }
    .btn:hover {
      border-color: var(--green-dim);
      transform: translateY(-1px);
      text-decoration: none;
    }

    .cursor {
      display: inline-block;
      width: .55em;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="code" aria-hidden="true">404</div>
  <div class="terminal-line"><span class="prompt">$</span> find / -name "that-page" <span class="cursor"></span></div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
  <a class="btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    Back to home
  </a>
</body>
</html>
