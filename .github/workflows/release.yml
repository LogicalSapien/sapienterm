# Required GitHub repository secrets:
#   KEYSTORE_BASE64        — base64-encoded .jks keystore file
#   KEYSTORE_PASSWORD      — keystore store password
#   KEY_ALIAS              — key alias inside the keystore
#   KEY_PASSWORD           — key password
#   PLAY_SERVICE_ACCOUNT_JSON — Google Play service account JSON (contents, not path)
#
# The workflow triggers on semver tags (e.g. v1.2.3).
# It builds a signed Google-flavour release AAB, uploads it to the Play Store
# internal track, and attaches it to a GitHub Release.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & publish release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required so app-versioning plugin can read git tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${KEYSTORE_PATH}"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "${GITHUB_ENV}"

      - name: Build signed release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleGoogleRelease --no-daemon

      - name: Upload AAB to Play Store (internal track)
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.logicalsapien.sapienterm
          releaseFiles: app/build/outputs/bundle/googleRelease/*.aab
          track: internal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/googleRelease/*.aab
          generate_release_notes: true
