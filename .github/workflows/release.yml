name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fetch secrets
        uses: dopplerhq/secrets-fetch-action@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: apps
          doppler-config: android
          inject-env-vars: true

      - name: Prepare signing
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"
          echo "$SAPIENTERM_SECRETS" | jq -r '.keystore_base64'      | base64 --decode > "${KEYSTORE_PATH}"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}"                                         >> "${GITHUB_ENV}"
          echo "KEYSTORE_PASSWORD=$(echo "$SAPIENTERM_SECRETS" | jq -r '.keystore_password')" >> "${GITHUB_ENV}"
          echo "KEY_ALIAS=$(echo "$SAPIENTERM_SECRETS"         | jq -r '.key_alias')"         >> "${GITHUB_ENV}"
          echo "KEY_PASSWORD=$(echo "$SAPIENTERM_SECRETS"      | jq -r '.key_password')"      >> "${GITHUB_ENV}"

      - name: Build release AAB
        run: ./gradlew bundleGoogleRelease --no-daemon

      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.logicalsapien.sapienterm
          releaseFiles: app/build/outputs/bundle/googleRelease/*.aab
          track: internal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/googleRelease/*.aab
          generate_release_notes: true
