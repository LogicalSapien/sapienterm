# Secrets are managed in Doppler (project: apps, config: android).
# The only GitHub secret needed is DOPPLER_TOKEN (a Doppler service token
# scoped to apps/android — generate one at doppler.com/workplace/service-tokens).
#
# Doppler secret used:
#   SAPIENTERM_SECRETS  — JSON with keystore_base64, keystore_password,
#                         key_alias, key_password
#   PLAY_SERVICE_ACCOUNT_JSON — shared Play Store service account (flat secret)
#
# The workflow triggers on semver tags (e.g. v1.2.3).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & publish release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required so app-versioning plugin can read git tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: apps
          doppler-config: android
          inject-env-vars: true

      - name: Decode keystore and set env
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.jks"
          echo "$SAPIENTERM_SECRETS" | jq -r '.keystore_base64' | base64 --decode > "${KEYSTORE_PATH}"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}"                                    >> "${GITHUB_ENV}"
          echo "KEYSTORE_PASSWORD=$(echo "$SAPIENTERM_SECRETS" | jq -r '.keystore_password')" >> "${GITHUB_ENV}"
          echo "KEY_ALIAS=$(echo "$SAPIENTERM_SECRETS"         | jq -r '.key_alias')"         >> "${GITHUB_ENV}"
          echo "KEY_PASSWORD=$(echo "$SAPIENTERM_SECRETS"      | jq -r '.key_password')"      >> "${GITHUB_ENV}"

      - name: Build signed release AAB
        run: ./gradlew bundleGoogleRelease --no-daemon

      - name: Upload AAB to Play Store (internal track)
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.logicalsapien.sapienterm
          releaseFiles: app/build/outputs/bundle/googleRelease/*.aab
          track: internal

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/googleRelease/*.aab
          generate_release_notes: true
