version: 2
updates:
- package-ecosystem: gradle
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 0

- package-ecosystem: gradle
  directory: "/translations"
  schedule:
    interval: daily
  open-pull-requests-limit: 0

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 0
